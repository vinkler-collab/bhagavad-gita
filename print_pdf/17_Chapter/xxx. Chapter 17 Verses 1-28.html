
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        /* Definice strany pro WeasyPrint */
        @page {
            size: A4;
            margin: 2.5cm 2cm 2.5cm 2cm;
            
            /* Automatické číslování stránek v patce */
            @bottom-center {
                content: "Page " counter(page);
                font-family: 'Gentium Book Plus', 'Gentium', 'Noto Serif', serif;
                font-size: 9pt;
                color: #888;
                border-top: 0.5pt solid #eee;
                width: 100%;
                padding-top: 10pt;
            }
        }

        body {
            /* Offline-safe font stack: no external web requests during PDF export. */
            font-family: 'Gentium Book Plus', 'Gentium', 'Noto Serif', serif;
            line-height: 1.6;
            color: #1a1a1a;
            font-size: 11pt;
        }
        
        .header {
            border-bottom: 2px solid #4a3b32;
            margin-bottom: 30pt;
            padding-bottom: 10pt;
        }
        .chapter-label { text-transform: uppercase; letter-spacing: 1pt; font-size: 10pt; color: #666; }
        h1 { margin: 5pt 0; font-size: 22pt; }
        
        .author-subtitle {
            font-size: 13pt;
            font-style: italic;
            color: #555;
            margin-top: 5pt;
        }
        
        .lecture-title {
            font-size: 20pt;
            font-style: bold;
            color: #000;
            margin: 0 0 30pt 0;
            padding-top: 10pt;
            border-bottom: 1px solid #4a3b32;
            page-break-before: always;
        }

        .lecture-title.first-lecture-title {
            page-break-before: avoid;
            margin-top: 20pt;
        }

        .verse-block {
            margin-bottom: 45pt;
            page-break-before: always;
            page-break-inside: avoid;
        }

        .verse-block.first-verse {
            page-break-before: avoid;
            page-break-inside: auto;
            break-inside: auto;
        }
        
        .verse-number {
            font-weight: bold;
            color: #000;
            border-bottom: 1px solid #f4bf7f;
            margin-bottom: 12pt;
            font-size: 14pt;
            text-transform: uppercase;
        }
        .devanagari {
            font-size: 15pt;
            margin-bottom: 10pt;
            line-height: 1.4;
            color: #000;
        }
        .iast {
            font-style: normal;
            font-size: 17pt;
            color: #000;
            margin-bottom: 14pt;
        }
        .glossary {
            font-size: 14pt;
            color: #000;
            margin-bottom: 14pt;
            text-align: justify;
            border-left: 0px solid #f0e6da;
            padding-left: 0pt;
            line-height: 1.6;
        }
        .glossary b { font-weight: 700; }
        .translation {
            font-size: 17pt;
            font-weight: 700;
            color: #000;
            border-left: 4px solid #f4bf7f;
            padding-left: 7pt;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="chapter-label">Chapter 17 — śraddhātraya vibhāga yoga</div>
        <h1>xxx. Chapter 17 Verses 1-28</h1>
        <div class="author-subtitle">Lectures by Swami Sarvapriyananda</div>
    </div>
    
        <div class="verse-block first-verse">
            <div class="verse-number">Verse 1.</div>
            <div class="devanagari">MP3VIVEKAVANI</div>
            <div class="iast">DEVAGIASTSLOVNIK</div>
            <div class="glossary"></div>
            <div class="translation">TRANSLATION</div>
        </div>
        
        <div class="verse-block">
            <div class="verse-number">Verse 2.</div>
            <div class="devanagari">MP3VIVEKAVANI</div>
            <div class="iast">DEVAGIASTSLOVNIK</div>
            <div class="glossary"></div>
            <div class="translation">TRANSLATION</div>
        </div>
        
</body>
</html>
